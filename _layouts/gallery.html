---
title: Gallery
---

<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>{{ page.title }}</title>
    <link rel="icon" href="{{ '/fav.jpg' | relative_url }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Courier+Prime:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/gallery.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/responsive.css' | relative_url }}">
  </head>
  <body>
    <nav class="navbar">
      <ul>
        <li><a href="{{ '/' | relative_url }}">Home</a></li>
        <li><a href="{{ '/about' | relative_url }}">About</a></li>
        <li><a href="{{ '/resume' | relative_url }}">CV</a></li>
        <li><a href="{{ '/gallery' | relative_url }}">Gallery</a></li>
      </ul>
    </nav>

    {{ content }}

    <!-- Lightbox -->
    <div class="lightbox-overlay" id="lightbox">
      <img id="lightbox-img" src="" alt=""
           oncontextmenu="return false"
           draggable="false">
    </div>

    <script>
    var lb    = document.getElementById('lightbox');
    var lbImg = document.getElementById('lightbox-img');

    // ── Open lightbox on frame click (NOT on img directly) ──
    document.querySelectorAll('.film-frame').forEach(function(frame) {
      frame.addEventListener('click', function() {
        var img = this.querySelector('img');
        if (!img) return;
        lbImg.src = img.getAttribute('data-src') || img.src;
        lb.classList.add('open');
      });
    });

    // ── Close lightbox ───────────────────────────────────────
    lb.addEventListener('click', function() {
      lb.classList.remove('open');
      setTimeout(function(){ lbImg.src = ''; }, 300);
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') lb.classList.remove('open');
    });

    // ── Block right-click & drag everywhere on this page ────
    document.addEventListener('contextmenu', function(e) {
      if (e.target.tagName === 'IMG') e.preventDefault();
    });
    document.addEventListener('dragstart', function(e) {
      if (e.target.tagName === 'IMG') e.preventDefault();
    });
    </script>

  </body>
</html>
